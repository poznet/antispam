imports:
    - { resource: services-config.yml }

services:
    _defaults:
        autowire: false
        autoconfigure: false
        public: false

    # Core services
    antispam.connection:
        class: AntispamBundle\Services\ConnectionService
        arguments: ["@configuration"]
        public: true

    antispam.inbox:
        class: AntispamBundle\Services\InboxService
        arguments: ["@antispam.connection"]
        public: true

    antispam.message:
        class: AntispamBundle\Services\MessageService
        public: true

    antispam.ssh:
        class: AntispamBundle\Services\SshService
        public: true

    # Scoring / DNSBL / header analysis
    antispam.dnsbl:
        class: AntispamBundle\Services\DnsblService
        arguments: ["@doctrine.orm.default_entity_manager"]
        public: true

    antispam.header_analyzer:
        class: AntispamBundle\Services\HeaderAnalyzer
        public: true

    antispam.scoring:
        class: AntispamBundle\Services\ScoringService
        arguments: ["@doctrine.orm.default_entity_manager", "@configuration"]
        public: true

    # Commands
    AntispamBundle\Command\AntispamGoCommand:
        arguments:
            - "@antispam.inbox"
            - "@event_dispatcher"
            - "@configuration"
        tags: ['console.command']

    AntispamBundle\Command\AntispamCheckCommand:
        arguments:
            - "@event_dispatcher"
        tags: ['console.command']

    AntispamBundle\Command\AgentDeployCommand:
        arguments:
            - "@doctrine.orm.default_entity_manager"
            - "@antispam.ssh"
        tags: ['console.command']

    AntispamBundle\Command\AgentSyncCommand:
        arguments:
            - "@doctrine.orm.default_entity_manager"
            - "@antispam.ssh"
        tags: ['console.command']

    AntispamBundle\Command\AgentScanCommand:
        arguments:
            - "@doctrine.orm.default_entity_manager"
            - "@antispam.ssh"
        tags: ['console.command']

    AntispamBundle\Command\AgentScanAllCommand:
        arguments:
            - "@doctrine.orm.default_entity_manager"
            - "@antispam.ssh"
        tags: ['console.command']

    AntispamBundle\Command\AgentHealthCommand:
        arguments:
            - "@doctrine.orm.default_entity_manager"
            - "@antispam.ssh"
        tags: ['console.command']

    # Config-check listener
    antispam.checkkonfig.listener:
        class: AntispamBundle\EventListener\CheckConfig\CheckEmailData
        arguments: ["@configuration"]
        tags:
            - { name: kernel.event_listener, event: antispam.check.config, method: CheckEmail }
            - { name: kernel.event_listener, event: antispam.check.config, method: CheckLogin }
            - { name: kernel.event_listener, event: antispam.check.config, method: CheckPass }
            - { name: kernel.event_listener, event: antispam.check.config, method: CheckImap }
            - { name: kernel.event_listener, event: antispam.check.config, method: tryToConnect }

    # Message pipeline
    # Priorities: higher = runs first. Whitelist short-circuits; scoring steps
    # accumulate; final decision runs at the tail.
    antispam.checkemail.listener.alreadychecked:
        class: AntispamBundle\EventListener\Message\CheckIfIsAlreadyChecked
        arguments: ["@antispam.message"]
        tags:
            - { name: kernel.event_listener, event: antispam.check.message, method: check, priority: 100000 }

    antispam.checkemail.listener.whitelistcheck:
        class: AntispamBundle\EventListener\Message\CheckWhitelist
        arguments: ["@doctrine.orm.default_entity_manager","@antispam.message"]
        tags:
            - { name: kernel.event_listener, event: antispam.check.message, method: check, priority: 99999  }

    antispam.checkemail.listener.emailwhitelistcheck:
        class: AntispamBundle\EventListener\Message\CheckEmailWhitelist
        arguments: ["@doctrine.orm.default_entity_manager","@antispam.message"]
        tags:
            - { name: kernel.event_listener, event: antispam.check.message, method: check, priority: 99998  }

    antispam.checkemail.listener.blacklistcheck:
        class: AntispamBundle\EventListener\Message\CheckBlacklist
        arguments: ["@doctrine.orm.default_entity_manager","@antispam.message","@antispam.scoring"]
        tags:
            - { name: kernel.event_listener, event: antispam.check.message, method: check, priority: 99997  }

    antispam.checkemail.listener.emailblacklistcheck:
        class: AntispamBundle\EventListener\Message\CheckEmailBlacklist
        arguments: ["@doctrine.orm.default_entity_manager","@antispam.message","@antispam.scoring"]
        tags:
            - { name: kernel.event_listener, event: antispam.check.message, method: check, priority: 99996  }

    antispam.checkemail.listener.headers:
        class: AntispamBundle\EventListener\Message\CheckHeaders
        arguments: ["@antispam.header_analyzer","@antispam.scoring"]
        tags:
            - { name: kernel.event_listener, event: antispam.check.message, method: check, priority: 99990  }

    antispam.checkemail.listener.dnsbl:
        class: AntispamBundle\EventListener\Message\CheckDnsbl
        arguments: ["@antispam.dnsbl","@antispam.scoring"]
        tags:
            - { name: kernel.event_listener, event: antispam.check.message, method: check, priority: 99980  }

    antispam.checkemail.listener.apply_decision:
        class: AntispamBundle\EventListener\Message\ApplyScoreDecision
        arguments: ["@antispam.scoring","@antispam.inbox"]
        tags:
            - { name: kernel.event_listener, event: antispam.check.message, method: decide, priority: 99970  }

    antispam.checkemail.listener.movetospam:
        class: AntispamBundle\EventListener\Message\MoveToSpam
        arguments: ["@configuration","@antispam.inbox"]
        tags:
            - { name: kernel.event_listener, event: antispam.check.message, method: move, priority: 99960  }

    antispam.checkemail.listener.setaschecked:
        class: AntispamBundle\EventListener\Message\SetAsChecked
        arguments: ["@antispam.message"]
        tags:
            - { name: kernel.event_listener, event: antispam.check.message, method: set, priority: -99999  }
