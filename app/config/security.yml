# Authentication and access control.
#
# The single application user is defined by the %admin_user% and
# %admin_password_hash% parameters, which are rendered into app/config/parameters.yml
# at container start from the ADMIN_USER / ADMIN_PASSWORD environment variables
# (see docker/entrypoint.sh).
security:

    encoders:
        Symfony\Component\Security\Core\User\User: bcrypt

    providers:
        app_users:
            memory:
                users:
                    '%admin_user%':
                        password: '%admin_password_hash%'
                        roles: ['ROLE_ADMIN']

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            anonymous: ~
            provider: app_users
            form_login:
                login_path: login
                check_path: login
                default_target_path: /
                csrf_token_generator: security.csrf.token_manager
            logout:
                path: logout
                target: /login

    access_control:
        - { path: ^/login, roles: IS_AUTHENTICATED_ANONYMOUSLY }
        - { path: ^/, roles: ROLE_ADMIN }
